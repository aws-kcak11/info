<!DOCTYPE html>
<html>
<head>
<title>Info</title>
<link href='//www.kcak11.com/favicon.ico' rel='icon' type='image/x-icon' />
</head>
<body>
	<div id="result"></div>
	<script type="text/javascript">
		var str = window.location.search;
		if (str) {
			if (str.indexOf("?") === 0) {
				str = str.substr(1);
			}
			str = str.split("+").join(" ");
			document.querySelector("#result").innerHTML = decodeURIComponent(str);
		}
	</script>
</body>
</html>
