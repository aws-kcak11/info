<!DOCTYPE html>
<html>

<head>
   <title>Info</title>
   <link href='//www.kcak11.com/favicon.ico' rel='icon' type='image/x-icon' />
   <meta content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0' name='viewport' />
   <meta name="theme-color" content="#6593E4" />
</head>

<body>
   <div id="result"></div>
   <script type="text/javascript">
      //<![CDATA[
      (function() {
          var str = window.location.search, info, renderPage = true;
          var featureCheck = function() {
              if (!window.btoa || !window.atob || !("btoa"in window) || !("atob"in window) || !("".trim)) {
                  alert("Please upgrade your browser for viewing this page.");
                  return false;
              }
              return true;
          };
          if (str) {
              if (str.indexOf("?") === 0) {
                  str = str.substr(1);
              }
              if (str.indexOf(btoa("kcak11")) === 0) {
                  if (featureCheck()) {
                      info = atob(decodeURIComponent(str.split(btoa("kcak11"))[1]));
                  } else {
                      renderPage = false;
                  }
              } else {
                  str = str.split("+").join(" ");
                  info = decodeURIComponent(str);
              }
              if (renderPage) {
                  document.open("text/html", "replace");
                  document.write(info);
                  document.close();
              }
          }
      }());
      //]]>
   </script>
</body>

</html>
